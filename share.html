<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Story - Youth Voice</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>

<header class="navbar">
    <h2>Youth Voice</h2>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="challenges.html">Challenges</a>
        <a href="solutions.html">Solutions</a>
        <a href="stories.html">Stories</a>
        <a href="share.html">Share Story</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <img src="images/14.jpg" alt="Share Story">
    <div class="hero-text">
        <h1>Share Your Story</h1>
        <p>Your voice matters. Inspire others by sharing your journey.</p>
    </div>
</section>

<main class="container">

    <form class="story-form" onsubmit="saveStory(event)">

        <h2>Tell Us Your Story</h2>

        <input type="text" id="name" placeholder="Your name (optional)">
        <input type="number" id="age" placeholder="Your age">
        <input type="text" id="country" placeholder="Your country">

        <textarea id="story" rows="6" placeholder="Write your story..." required></textarea>

        <textarea id="lesson" rows="4" placeholder="What did you learn?"></textarea>

        <button type="submit">📩 Submit Story</button>

    </form>

</main>

<!-- POPUP -->
<div id="popup" class="popup hidden">
    <div class="popup-box">
        <h2>✅ Story Submitted!</h2>
        <p id="popup-text"></p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<footer>
    <p>© 2026 Youth Voice. All Rights Reserved.</p>
</footer>

</body>
</html>
